background {
    monitor =
    # Takes a screenshot of your current Sway workspace and blurs it
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.015
    contrast = 0.85
    brightness = 0.45
    vibrancy = 0.15
}

# 1. Monospace Matrix Clock
label {
    monitor =
    text = $TIME
    color = rgb(0, 255, 102) # Matrix Neon Green
    font_size = 90
    font_family = monospace
    position = 0, 160
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 255, 102, 0.2)
}

# 2. System Status / Warning Label
label {
    monitor =
    text = cmd[update:5000] echo "RESTR_ACCESS // SESSION: $USER@$(hostname)"
    color = rgb(0, 180, 70)
    font_size = 12
    font_family = monospace
    position = 0, 70
    halign = center
    valign = center
}

# 3. Tactical Command-Line Input Box
input-field {
    monitor =
    size = 320, 50
    outline_thickness = 2
    
    # Dot configurations (looks like password masking characters)
    dots_size = 0.3
    dots_spacing = 0.4
    dots_center = true
    
    # Color layouts (Normal, Checking, Fail)
    outer_color = rgb(0, 255, 102)
    inner_color = rgb(10, 15, 10)
    font_color = rgb(0, 255, 102)
    check_color = rgb(230, 180, 34)
    fail_color = rgb(255, 50, 50)
    
    # Prompt feedback text strings
    fade_on_empty = false
    placeholder_text = <span color="##00ff66">> ENTER ACCESS KEY_</span>
    fail_text = <span color="##ff3333">> ACCESS_DENIED (AUTH_ERR_$ATTEMPTS)</span>
    
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}
